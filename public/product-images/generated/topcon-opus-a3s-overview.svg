<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">TOPCON OPUS A3s Product overview</title>
  <desc id="desc">Compact keyed HMI for tactile operator input</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.54" stop-color="#0f172a" />
      <stop offset="1" stop-color="#172554" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24" />
      <stop offset="1" stop-color="#86efac" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="56%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.28" />
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .halo { fill: url(#halo); }
      .grid { stroke: #94a3b8; stroke-opacity: .08; stroke-width: 1; }
      .glyph { fill: #e2e8f0; opacity: .10; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 30px; font-weight: 700; }
      .title { fill: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 54px; font-weight: 800; letter-spacing: -.04em; }
      .eyebrow { fill: #fbbf24; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 18px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
      .subtitle { fill: #cbd5e1; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 24px; font-weight: 600; }
      .fine-label { fill: #94a3b8; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 18px; font-weight: 600; }
      .device-body { fill: #111827; stroke: url(#accent); stroke-width: 4; filter: url(#softGlow); }
      .device-side { fill: #1e293b; stroke: #475569; stroke-width: 3; }
      .screen { fill: #020617; stroke: #334155; stroke-width: 3; }
      .screen-grid { stroke: #fbbf24; stroke-opacity: .28; stroke-width: 2; }
      .screen-text { fill: #e0f2fe; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 27px; font-weight: 800; }
      .small-screen-text { fill: #bae6fd; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 16px; font-weight: 700; }
      .button-key { fill: #334155; stroke: #64748b; stroke-width: 2; }
      .button-key.active { fill: #fbbf24; opacity: .9; }
      .panel rect { fill: rgba(15, 23, 42, .76); stroke: rgba(148, 163, 184, .26); stroke-width: 2; }
      .panel-eyebrow { fill: #fbbf24; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 15px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      .panel-title { fill: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -.03em; }
      .panel-copy { fill: #cbd5e1; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 20px; font-weight: 650; }
      .panel-copy.strong { fill: #f1f5f9; font-size: 19px; }
      .pill rect, .port rect { fill: rgba(30, 41, 59, .94); stroke: #fbbf24; stroke-opacity: .44; stroke-width: 2; }
      .pill text, .port text { fill: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 18px; font-weight: 750; }
      .bus-line path { fill: none; stroke: url(#accent); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 16 16; }
      .bus-line circle, .node { fill: #fbbf24; filter: url(#softGlow); }
      .signal { fill: none; stroke: url(#accent); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 14; }
      .equipment { fill: #1e293b; stroke: #64748b; stroke-width: 4; }
      .cab { fill: #334155; stroke: #fbbf24; stroke-width: 3; }
      .window { fill: #0f172a; stroke: #67e8f9; stroke-width: 3; opacity: .92; }
      .arm { fill: none; stroke: #64748b; stroke-width: 20; stroke-linecap: round; }
      .floor { fill: #334155; opacity: .62; }
      .wheel { fill: #0f172a; stroke: #64748b; stroke-width: 12; }
      .logger-case { fill: #111827; stroke: url(#accent); stroke-width: 4; filter: url(#softGlow); }
      .logger-face { fill: #1e293b; stroke: #475569; stroke-width: 3; }
      .module-terminal { fill: #334155; stroke: #64748b; stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="800" rx="0" />
  <rect class="halo" width="1200" height="800" />
  <g><path class="grid" d="M0 0 V800" /><path class="grid" d="M80 0 V800" /><path class="grid" d="M160 0 V800" /><path class="grid" d="M240 0 V800" /><path class="grid" d="M320 0 V800" /><path class="grid" d="M400 0 V800" /><path class="grid" d="M480 0 V800" /><path class="grid" d="M560 0 V800" /><path class="grid" d="M640 0 V800" /><path class="grid" d="M720 0 V800" /><path class="grid" d="M800 0 V800" /><path class="grid" d="M880 0 V800" /><path class="grid" d="M960 0 V800" /><path class="grid" d="M1040 0 V800" /><path class="grid" d="M1120 0 V800" /><path class="grid" d="M1200 0 V800" /><path class="grid" d="M0 0 H1200" /><path class="grid" d="M0 80 H1200" /><path class="grid" d="M0 160 H1200" /><path class="grid" d="M0 240 H1200" /><path class="grid" d="M0 320 H1200" /><path class="grid" d="M0 400 H1200" /><path class="grid" d="M0 480 H1200" /><path class="grid" d="M0 560 H1200" /><path class="grid" d="M0 640 H1200" /><path class="grid" d="M0 720 H1200" /><path class="grid" d="M0 800 H1200" /></g>
  <g><text class="glyph" x="1060" y="86">{</text><text class="glyph" x="940" y="104">CAN</text><text class="glyph" x="86" y="712">&lt;&gt;</text><text class="glyph" x="1030" y="704">//</text><text class="glyph" x="545" y="92">[]</text><text class="glyph" x="610" y="716">=</text></g>
  <text class="eyebrow" x="70" y="88">Product overview</text>
  <text class="title" x="70" y="146">TOPCON OPUS A3s</text>
  <text class="subtitle" x="72" y="190">4.3 in HMI</text>
  
    
    <g>
      <rect class="device-body" x="92" y="190" width="500" height="340" rx="34" />
      <rect class="screen" x="177" y="247.8" width="330" height="224.39999999999998" rx="22" />
      <path class="screen-grid" d="M205 297.8 H479" />
      <path class="screen-grid" d="M205 420.2 H479" />
      <path class="screen-grid" d="M235 275.8 V444.2" />
      <text class="screen-text" x="219" y="352">4.3 in</text>
      <text class="small-screen-text" x="219" y="388">HMI / CAN-Bus</text>
      
          <rect class="button-key " x="120" y="265.8" width="27" height="24" rx="8" />
          <rect class="button-key " x="535" y="265.8" width="27" height="24" rx="8" />
        
          <rect class="button-key active" x="120" y="297.2" width="27" height="24" rx="8" />
          <rect class="button-key " x="535" y="297.2" width="27" height="24" rx="8" />
        
          <rect class="button-key " x="120" y="328.6" width="27" height="24" rx="8" />
          <rect class="button-key " x="535" y="328.6" width="27" height="24" rx="8" />
        
          <rect class="button-key " x="120" y="360" width="27" height="24" rx="8" />
          <rect class="button-key active" x="535" y="360" width="27" height="24" rx="8" />
        
          <rect class="button-key " x="120" y="391.4" width="27" height="24" rx="8" />
          <rect class="button-key " x="535" y="391.4" width="27" height="24" rx="8" />
        
          <rect class="button-key " x="120" y="422.79999999999995" width="27" height="24" rx="8" />
          <rect class="button-key " x="535" y="422.79999999999995" width="27" height="24" rx="8" />
        
      <circle class="button-key active" cx="540" cy="480" r="22" /><circle class="button-key" cx="540" cy="480" r="10" />
    </g>
  
    <g class="panel" transform="translate(650 150)">
      <rect width="420" height="430" rx="34" />
      <text class="panel-eyebrow" x="40" y="70">at a glance</text>
      <text class="panel-title" x="40" y="118">TOPCON OPUS A3s</text>
      <text class="panel-copy" x="40" y="156">TOPCON OPUS A series</text>
      
    <g class="pill">
      <rect x="40" y="190" width="310" height="48" rx="24" />
      <circle cx="70" cy="214" r="7" fill="#fbbf24" />
      <text x="94" y="221">Soft keys</text>
    </g>
  
    <g class="pill">
      <rect x="40" y="248" width="310" height="48" rx="24" />
      <circle cx="70" cy="272" r="7" fill="#fbbf24" />
      <text x="94" y="279">Encoder</text>
    </g>
  
    <g class="pill">
      <rect x="40" y="306" width="310" height="48" rx="24" />
      <circle cx="70" cy="330" r="7" fill="#fbbf24" />
      <text x="94" y="337">2x CAN-Bus</text>
    </g>
  
    <g class="pill">
      <rect x="40" y="364" width="310" height="48" rx="24" />
      <circle cx="70" cy="388" r="7" fill="#fbbf24" />
      <text x="94" y="395">Front USB</text>
    </g>
  
    </g>
    <path class="signal" d="M550 360 C605 290, 605 430, 660 360" />
  
</svg>
